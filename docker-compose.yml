# JCodeQuest — backend + judge + authoring + frontend + admin dashboard 5종 서비스.
#
# 사용:
#   cp .env.docker.example .env.docker
#   # .env.docker 채우기 (JCQ_DB_URL, SUPABASE_URL, JCQ_INTERNAL_SECRET, JCQ_ADMIN_TOKEN 등)
#   docker compose --env-file .env.docker up --build -d
#
# 주의:
#   - DB는 Supabase PostgreSQL (외부) — JCQ_DB_URL 환경변수로 연결.
#     backend·authoring 모두 같은 Supabase 프로젝트를 바라보지만,
#     authoring은 backend HTTP API를 통해 접근하므로 JCQ_DB_URL은 backend만 사용.
#   - 인증은 Supabase Auth(Google OIDC) — JWT는 backend가 검증, OAuth 흐름은
#     프런트엔드(@supabase/supabase-js)가 직접 처리.
#   - frontend는 Vite 빌드 결과를 nginx로 서빙. VITE_* 변수는 빌드 타임에 주입돼야 한다.
#   - admin dashboard는 단일 정적 HTML을 nginx로 :6010에 서빙. 브라우저가 host로
#     매핑된 authoring(:8001)과 judge(:8002)에 직접 호출하므로 두 서비스의
#     JCQ_DASHBOARD_ORIGIN과 이 대시보드 origin을 일치시켜야 CORS preflight가 통과한다.
#     /api/submissions* 는 judge_engine 담당 — authoring은 문제/공지/runs만 처리.

x-common-env: &common-env
  PYTHONUNBUFFERED: "1"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: jcq-backend
    restart: unless-stopped
    environment:
      <<: *common-env
      # DB (Supabase PostgreSQL — Transaction Pooler URL 권장)
      JCQ_DB_URL: "${JCQ_DB_URL}"
      # 채점 엔진 (compose 내부 네트워크)
      JCQ_JUDGE_URL: "http://judge:8002"
      JCQ_INTERNAL_SECRET: "${JCQ_INTERNAL_SECRET}"
      # 튜터 / OpenAI 호환
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
      # Supabase Auth (JWT 검증) — prod에서는 SUPABASE_URL 필수
      SUPABASE_URL: "${SUPABASE_URL:-}"
      SUPABASE_JWT_SECRET: "${SUPABASE_JWT_SECRET:-}"
      # 개발 편의 (prod 금지)
      JCQ_AUTH_ALLOW_DEV_STUB: "${JCQ_AUTH_ALLOW_DEV_STUB:-}"
      JCQ_COOKIE_INSECURE: "${JCQ_COOKIE_INSECURE:-}"
      JCQ_SUBMIT_COOLDOWN_S: "${JCQ_SUBMIT_COOLDOWN_S:-10}"
      # CORS — 외부 origin은 쉼표 구분으로 JCQ_CORS_ORIGINS, IP 대역은 regex.
      # 로컬 개발 origin(5173/5500/8001)은 코드에 기본값으로 박혀 있어 추가 설정 불필요.
      JCQ_CORS_ORIGINS: "${JCQ_CORS_ORIGINS:-}"
      JCQ_CORS_ORIGIN_REGEX: "${JCQ_CORS_ORIGIN_REGEX:-}"
    ports:
      - "8000:8000"
    depends_on:
      - judge
    networks: [jcq]

  judge:
    build:
      context: .
      dockerfile: judge_engine/Dockerfile
    container_name: jcq-judge
    restart: unless-stopped
    environment:
      <<: *common-env
      # backend webhook (compose 네트워크 내)
      JCQ_BACKEND_URL: "http://backend:8000"
      JCQ_INTERNAL_SECRET: "${JCQ_INTERNAL_SECRET}"
      # Ollama (외부 호스트)
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      JCQ_QUEUE_CONCURRENCY: "${JCQ_QUEUE_CONCURRENCY:-1}"
      # DEV ONLY — 3-LLM 앙상블 스킵 (Ollama 없이 개발할 때). prod 금지.
      JCQ_SKIP_ENSEMBLE: "${JCQ_SKIP_ENSEMBLE:-}"
      # LangSmith (선택) — judge 전용 키
      LANGSMITH_API_KEY: "${LANGSMITH_API_KEY_JUDGE:-}"
      LANGSMITH_PROJECT: "${LANGSMITH_PROJECT_JUDGE:-jcq-judge}"
      # Admin 대시보드 — /api/submissions* 가 judge로 옮겨왔으므로 authoring과 동일하게
      # Bearer 토큰 + CORS origin이 필요. 토큰은 authoring과 같은 값.
      JCQ_ADMIN_TOKEN: "${JCQ_ADMIN_TOKEN}"
      JCQ_DASHBOARD_ORIGIN: "${JCQ_DASHBOARD_ORIGIN:-http://localhost:6010}"
    ports:
      # 대시보드가 브라우저에서 직접 호출 — 호스트로 노출 필요.
      - "8002:8002"
    networks: [jcq]

  authoring:
    build:
      context: .
      dockerfile: authoring_engine/Dockerfile
    container_name: jcq-authoring
    restart: unless-stopped
    environment:
      <<: *common-env
      # DB는 backend HTTP API로 위임 — authoring은 JCQ_DB_URL을 직접 참조하지 않음.
      # backend·judge 내부 API
      JCQ_BACKEND_URL: "http://backend:8000"
      JCQ_JUDGE_URL: "http://judge:8002"
      JCQ_INTERNAL_SECRET: "${JCQ_INTERNAL_SECRET}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      JCQ_AUTHOR_MODEL: "${JCQ_AUTHOR_MODEL:-qwen2.5-coder:14b-instruct-q5_K_M}"
      JCQ_VARIANT_COUNT: "${JCQ_VARIANT_COUNT:-5}"
      JCQ_AUTHOR_RETRIES: "${JCQ_AUTHOR_RETRIES:-2}"
      JCQ_JUDGE_PASS_THRESHOLD: "${JCQ_JUDGE_PASS_THRESHOLD:-0.7}"
      JCQ_SOLVER_PASS_MIN_AC: "${JCQ_SOLVER_PASS_MIN_AC:-1}"
      # LangSmith — authoring 전용 키 (judge와 별도)
      LANGSMITH_API_KEY: "${LANGSMITH_API_KEY_AUTHORING:-}"
      LANGSMITH_PROJECT: "${LANGSMITH_PROJECT_AUTHORING:-jcq-authoring}"
      LANGCHAIN_TRACING_V2: "${LANGCHAIN_TRACING_V2:-}"
      LANGCHAIN_ENDPOINT: "${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}"
      # Admin 대시보드 — Bearer 토큰 + CORS origin. 대시보드 컨테이너가 같은 토큰을
      # 굳이 알 필요는 없다 (브라우저에서 사람이 직접 입력) — 여기엔 authoring 측만 주입.
      JCQ_ADMIN_TOKEN: "${JCQ_ADMIN_TOKEN}"
      JCQ_DASHBOARD_ORIGIN: "${JCQ_DASHBOARD_ORIGIN:-http://localhost:6010}"
    ports:
      - "8001:8001"
    depends_on:
      - backend
      - judge
    networks: [jcq]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      # Vite는 빌드 타임에 import.meta.env를 인라인 — build args로 주입.
      args:
        VITE_SUPABASE_URL: "${VITE_SUPABASE_URL:-}"
        VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY:-}"
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8000}"
    container_name: jcq-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    networks: [jcq]

  dashboard:
    # 정적 HTML 1장 — 빌드 args, 환경변수 모두 없다.
    # 브라우저가 페이지 받아 host 매핑된 authoring(:8001)으로 직접 호출 →
    # authoring 측의 JCQ_DASHBOARD_ORIGIN과 이 서비스가 노출하는 origin이 일치해야 한다.
    # 토큰은 사람이 ⚙ 설정 화면에 입력 → localStorage에 저장. 컨테이너에는 안 들어감.
    build:
      context: .
      dockerfile: admin_dashboard/Dockerfile
    container_name: jcq-dashboard
    restart: unless-stopped
    ports:
      - "6010:80"
    networks: [jcq]

networks:
  jcq:
    driver: bridge
