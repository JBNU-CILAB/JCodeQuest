# JCodeQuest — backend + judge + authoring + frontend + admin dashboard 5종 서비스.
#
# 사용:
#   cp .env.docker.example .env.docker
#   # .env.docker 채우기 (JCQ_DB_URL, SUPABASE_URL, JCQ_INTERNAL_SECRET, JCQ_ADMIN_TOKEN 등)
#   docker compose --env-file .env.docker up --build -d
#
# 주의:
#   - DB는 Supabase PostgreSQL (외부) — JCQ_DB_URL 환경변수로 연결.
#     backend·authoring 모두 같은 Supabase 프로젝트를 바라보지만,
#     authoring은 backend HTTP API를 통해 접근하므로 JCQ_DB_URL은 backend만 사용.
#   - 인증은 Supabase Auth(Google OIDC) — JWT는 backend가 검증, OAuth 흐름은
#     프런트엔드(@supabase/supabase-js)가 직접 처리.
#   - frontend는 Vite 빌드 결과를 nginx로 서빙. VITE_* 변수는 빌드 타임에 주입돼야 한다.
#   - admin dashboard는 단일 정적 HTML을 nginx로 :6010에 서빙. 브라우저가 host로
#     매핑된 authoring(:8001)과 judge(:8002)에 직접 호출하므로 두 서비스의
#     JCQ_DASHBOARD_ORIGIN과 이 대시보드 origin을 일치시켜야 CORS preflight가 통과한다.
#     /api/submissions* 는 judge_engine 담당 — authoring은 문제/공지/runs만 처리.

x-common-env: &common-env
  PYTHONUNBUFFERED: "1"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: jcq-backend
    restart: unless-stopped
    environment:
      <<: *common-env
      # DB (Supabase PostgreSQL — Transaction Pooler URL 권장)
      JCQ_DB_URL: "${JCQ_DB_URL}"
      # 채점 엔진 (compose 내부 네트워크)
      JCQ_JUDGE_URL: "http://judge:8002"
      JCQ_INTERNAL_SECRET: "${JCQ_INTERNAL_SECRET}"
      # 튜터 / OpenAI 호환
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
      # Supabase Auth (JWT 검증) — prod에서는 SUPABASE_URL 필수
      SUPABASE_URL: "${SUPABASE_URL:-}"
      SUPABASE_JWT_SECRET: "${SUPABASE_JWT_SECRET:-}"
      # 개발 편의 (prod 금지)
      JCQ_AUTH_ALLOW_DEV_STUB: "${JCQ_AUTH_ALLOW_DEV_STUB:-}"
      JCQ_COOKIE_INSECURE: "${JCQ_COOKIE_INSECURE:-}"
      JCQ_SUBMIT_COOLDOWN_S: "${JCQ_SUBMIT_COOLDOWN_S:-10}"
      # CORS — 외부 origin은 쉼표 구분으로 JCQ_CORS_ORIGINS, IP 대역은 regex.
      # 로컬 개발 origin(5173/5500/8001)은 코드에 기본값으로 박혀 있어 추가 설정 불필요.
      JCQ_CORS_ORIGINS: "${JCQ_CORS_ORIGINS:-}"
      JCQ_CORS_ORIGIN_REGEX: "${JCQ_CORS_ORIGIN_REGEX:-}"
    ports:
      - "8000:8000"
    depends_on:
      - judge
    networks: [jcq]

  judge:
    build:
      context: .
      dockerfile: judge_engine/Dockerfile
    container_name: jcq-judge
    restart: unless-stopped
    environment:
      <<: *common-env
      # backend webhook (compose 네트워크 내)
      JCQ_BACKEND_URL: "http://backend:8000"
      JCQ_INTERNAL_SECRET: "${JCQ_INTERNAL_SECRET}"
      # Ollama (외부 호스트)
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      JCQ_QUEUE_CONCURRENCY: "${JCQ_QUEUE_CONCURRENCY:-1}"
      # DEV ONLY — 3-LLM 앙상블 스킵 (Ollama 없이 개발할 때). prod 금지.
      JCQ_SKIP_ENSEMBLE: "${JCQ_SKIP_ENSEMBLE:-}"
      # 채점 3-LLM 앙상블 모델 (Melchior/Balthasar/Casper) — authoring과 동일 env로 단일 소스화.
      JCQ_ENSEMBLE_MODEL_MELCHIOR: "${JCQ_ENSEMBLE_MODEL_MELCHIOR:-qwen3.6:27b}"
      JCQ_ENSEMBLE_MODEL_BALTHASAR: "${JCQ_ENSEMBLE_MODEL_BALTHASAR:-deepseek-coder-v2:lite}"
      JCQ_ENSEMBLE_MODEL_CASPER: "${JCQ_ENSEMBLE_MODEL_CASPER:-llama3.1:8b}"
      # LangSmith (선택) — judge 전용 키
      LANGSMITH_API_KEY: "${LANGSMITH_API_KEY_JUDGE:-}"
      LANGSMITH_PROJECT: "${LANGSMITH_PROJECT_JUDGE:-jcq-judge}"
      # Admin 대시보드 — /api/submissions* 가 judge로 옮겨왔으므로 authoring과 동일하게
      # Bearer 토큰 + CORS origin이 필요. 토큰은 authoring과 같은 값.
      JCQ_ADMIN_TOKEN: "${JCQ_ADMIN_TOKEN}"
      JCQ_DASHBOARD_ORIGIN: "${JCQ_DASHBOARD_ORIGIN:-http://localhost:6010}"
    ports:
      # 대시보드가 브라우저에서 직접 호출 — 호스트로 노출 필요.
      - "8002:8002"
    networks: [jcq]

  authoring:
    build:
      context: .
      dockerfile: authoring_engine/Dockerfile
    container_name: jcq-authoring
    restart: unless-stopped
    environment:
      <<: *common-env
      # DB는 backend HTTP API로 위임 — authoring은 JCQ_DB_URL을 직접 참조하지 않음.
      # backend·judge 내부 API
      JCQ_BACKEND_URL: "http://backend:8000"
      JCQ_JUDGE_URL: "http://judge:8002"
      JCQ_INTERNAL_SECRET: "${JCQ_INTERNAL_SECRET}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      # LLM 프로바이더 스위치 — openai로 바꾸면 generate/verify/judge/solve/attack/compare
      # 전 노드가 OpenAI를 사용(빠른 검증). 임베딩(novelty·RAG)은 계속 Ollama.
      JCQ_LLM_PROVIDER: "${JCQ_LLM_PROVIDER:-ollama}"
      JCQ_OPENAI_API_KEY: "${JCQ_OPENAI_API_KEY:-}"
      JCQ_OPENAI_MODEL: "${JCQ_OPENAI_MODEL:-gpt-4o-mini}"
      JCQ_OPENAI_BASE_URL: "${JCQ_OPENAI_BASE_URL:-}"
      JCQ_AUTHOR_MODEL: "${JCQ_AUTHOR_MODEL:-qwen3.6:27b}"
      # 출제 엔진 3-LLM 앙상블 (Melchior/Balthasar/Casper). solve + judge 공통, compare는 Melchior 단독.
      JCQ_ENSEMBLE_MODEL_MELCHIOR: "${JCQ_ENSEMBLE_MODEL_MELCHIOR:-qwen3.6:27b}"
      JCQ_ENSEMBLE_MODEL_BALTHASAR: "${JCQ_ENSEMBLE_MODEL_BALTHASAR:-deepseek-coder-v2:lite}"
      JCQ_ENSEMBLE_MODEL_CASPER: "${JCQ_ENSEMBLE_MODEL_CASPER:-llama3.1:8b}"
      # 앙상블 context window (solve/judge/compare 공통). generate/verify의 JCQ_AUTHOR_NUM_CTX와 별개.
      JCQ_ENSEMBLE_NUM_CTX: "${JCQ_ENSEMBLE_NUM_CTX:-8192}"
      # 앙상블 temperature(채점·심사 결정론적이라 0 권장) / generate draft temperature
      JCQ_ENSEMBLE_TEMPERATURE: "${JCQ_ENSEMBLE_TEMPERATURE:-0}"
      JCQ_AUTHOR_TEMPERATURE: "${JCQ_AUTHOR_TEMPERATURE:-0}"
      # Ollama keep_alive(모든 LLM 호출 공통) / verify 최소 test_input 수 / solver 샘플 노출 수
      JCQ_OLLAMA_KEEP_ALIVE: "${JCQ_OLLAMA_KEEP_ALIVE:-30m}"
      JCQ_AUTHOR_MIN_TEST_CASES: "${JCQ_AUTHOR_MIN_TEST_CASES:-4}"
      JCQ_SOLVER_SAMPLE_LIMIT: "${JCQ_SOLVER_SAMPLE_LIMIT:-2}"
      JCQ_VARIANT_COUNT: "${JCQ_VARIANT_COUNT:-5}"
      JCQ_AUTHOR_RETRIES: "${JCQ_AUTHOR_RETRIES:-2}"
      # 복잡한 문제 JSON truncate 방지용 context window
      JCQ_AUTHOR_NUM_CTX: "${JCQ_AUTHOR_NUM_CTX:-16384}"
      # verify 재시도 시 temperature — 0이면 결정론적 반복 실패
      JCQ_AUTHOR_RETRY_TEMPERATURE: "${JCQ_AUTHOR_RETRY_TEMPERATURE:-0.4}"
      # reference_code가 time_limit_ms 대비 통과해야 하는 비율 (이전 0.5 → 0.8 완화)
      JCQ_AUTHOR_PERF_RATIO: "${JCQ_AUTHOR_PERF_RATIO:-0.8}"
      JCQ_JUDGE_PASS_THRESHOLD: "${JCQ_JUDGE_PASS_THRESHOLD:-0.7}"
      JCQ_SOLVER_PASS_MIN_AC: "${JCQ_SOLVER_PASS_MIN_AC:-1}"
      # judge self-consistency — 1이면 기존 단일 호출, >1이면 N회 샘플 후 다수결/중앙값
      JCQ_JUDGE_SAMPLES: "${JCQ_JUDGE_SAMPLES:-1}"
      JCQ_JUDGE_SELFCONSIST_TEMP: "${JCQ_JUDGE_SELFCONSIST_TEMP:-0.3}"
      # 테스트 변별력 게이트 — 결함 풀이 N개를 만들어 테스트가 최소 MIN_REJECT개를 탈락시켜야 통과
      JCQ_DISCRIMINATION_ENABLED: "${JCQ_DISCRIMINATION_ENABLED:-1}"
      JCQ_DISCRIMINATION_ATTACKS: "${JCQ_DISCRIMINATION_ATTACKS:-2}"
      JCQ_DISCRIMINATION_MIN_REJECT: "${JCQ_DISCRIMINATION_MIN_REJECT:-1}"
      # compare 게이트 승격 — 환각 임계 초과 / 의도유사도 미달이면 폐기 (난이도는 기록만)
      JCQ_COMPARE_GATE_ENABLED: "${JCQ_COMPARE_GATE_ENABLED:-1}"
      JCQ_COMPARE_MAX_HALLUCINATION: "${JCQ_COMPARE_MAX_HALLUCINATION:-0.5}"
      JCQ_COMPARE_MIN_INTENT_SIM: "${JCQ_COMPARE_MIN_INTENT_SIM:-0.4}"
      # LangSmith — authoring 전용 키 (judge와 별도)
      LANGSMITH_API_KEY: "${LANGSMITH_API_KEY_AUTHORING:-}"
      LANGSMITH_PROJECT: "${LANGSMITH_PROJECT_AUTHORING:-jcq-authoring}"
      LANGCHAIN_TRACING_V2: "${LANGCHAIN_TRACING_V2:-}"
      LANGCHAIN_ENDPOINT: "${LANGCHAIN_ENDPOINT:-https://api.smith.langchain.com}"
      # Admin 대시보드 — Bearer 토큰 + CORS origin. 대시보드 컨테이너가 같은 토큰을
      # 굳이 알 필요는 없다 (브라우저에서 사람이 직접 입력) — 여기엔 authoring 측만 주입.
      JCQ_ADMIN_TOKEN: "${JCQ_ADMIN_TOKEN}"
      JCQ_DASHBOARD_ORIGIN: "${JCQ_DASHBOARD_ORIGIN:-http://localhost:6010}"
    ports:
      - "8001:8001"
    depends_on:
      - backend
      - judge
    networks: [jcq]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      # Vite는 빌드 타임에 import.meta.env를 인라인 — build args로 주입.
      args:
        VITE_SUPABASE_URL: "${VITE_SUPABASE_URL:-}"
        VITE_SUPABASE_ANON_KEY: "${VITE_SUPABASE_ANON_KEY:-}"
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8000}"
    container_name: jcq-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    networks: [jcq]

  dashboard:
    # 정적 HTML 1장 — 빌드 args, 환경변수 모두 없다.
    # 브라우저가 페이지 받아 host 매핑된 authoring(:8001)으로 직접 호출 →
    # authoring 측의 JCQ_DASHBOARD_ORIGIN과 이 서비스가 노출하는 origin이 일치해야 한다.
    # 토큰은 사람이 ⚙ 설정 화면에 입력 → localStorage에 저장. 컨테이너에는 안 들어감.
    build:
      context: .
      dockerfile: admin_dashboard/Dockerfile
    container_name: jcq-dashboard
    restart: unless-stopped
    ports:
      - "6010:80"
    networks: [jcq]

networks:
  jcq:
    driver: bridge
