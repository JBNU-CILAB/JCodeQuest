name: OpenAPI drift check

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'authoring_engine/**'
      - 'shared/**'
      - 'scripts/dump_openapi.py'
      - 'docs/openapi-*.json'
      - '.github/workflows/openapi.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'authoring_engine/**'
      - 'shared/**'
      - 'scripts/dump_openapi.py'

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        # 단일 env에 양쪽 패키지 의존성을 모두 설치 (CI 단일 인터프리터로 처리)
        run: |
          python -m pip install --upgrade pip
          pip install -e shared
          pip install -r backend/requirements.txt
          pip install -e authoring_engine

      - name: Dump OpenAPI specs
        run: python scripts/dump_openapi.py both

      - name: Check for drift
        run: |
          if ! git diff --exit-code docs/openapi-backend.json docs/openapi-authoring.json; then
            echo "::error::OpenAPI JSON is out of date. Run scripts/dump_openapi.py locally and commit the changes."
            exit 1
          fi
